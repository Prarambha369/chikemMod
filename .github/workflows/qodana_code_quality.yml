#-------------------------------------------------------------------------------#
#            Discover all capabilities of Qodana in our documentation           #
#             https://www.jetbrains.com/help/qodana/about-qodana.html           #
#-------------------------------------------------------------------------------#

name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check QODANA_TOKEN availability
        id: token_check
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        run: |
          if [ -n "$QODANA_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Qodana Scan (PR)'
        if: ${{ github.event_name == 'pull_request' && steps.token_check.outputs.has_token == 'true' }}
        uses: JetBrains/qodana-action@v2025.3.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          # When pr-mode is set to true, Qodana analyzes only the files that have been changed
          pr-mode: true
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          # Upload Qodana results (SARIF, other artifacts, logs) as an artifact to the job
          upload-result: false
          # quick-fixes available in Ultimate and Ultimate Plus plans
          push-fixes: 'none'

      - name: 'Qodana Scan (Push/Manual)'
        if: ${{ github.event_name != 'pull_request' && steps.token_check.outputs.has_token == 'true' }}
        uses: JetBrains/qodana-action@v2025.3.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: false
          use-annotations: true
          upload-result: false
          push-fixes: 'none'

      - name: 'Skip notice (missing QODANA_TOKEN)'
        if: ${{ steps.token_check.outputs.has_token != 'true' }}
        run: echo "QODANA_TOKEN is not set; skipping Qodana scan."
